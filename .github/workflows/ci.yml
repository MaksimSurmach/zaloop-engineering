name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          VITE_UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          VITE_UMAMI_SCRIPT_URL: ${{ secrets.UMAMI_SCRIPT_URL }}
      - run: npm run validate:static

  publish:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}
            VITE_UMAMI_SCRIPT_URL=${{ secrets.UMAMI_SCRIPT_URL }}
          tags: |
            ghcr.io/maksimsurmach/zaloop-engineering:${{ github.sha }}
            ghcr.io/maksimsurmach/zaloop-engineering:latest
